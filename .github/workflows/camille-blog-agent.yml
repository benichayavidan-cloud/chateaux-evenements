name: Camille — Blog SEO + GEO Agent

on:
  schedule:
    # 8:30 AM Paris = 6:30 AM UTC (été CEST) / 7:30 AM UTC (hiver CET)
    # Pipeline vérifie le planning dans Supabase agent_controls
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  camille:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: scripts/agent-cm
        run: npm ci

      - name: Run pipeline
        id: pipeline
        working-directory: scripts/agent-cm
        run: node pipeline.js | tee /tmp/pipeline-result.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Validate images
        run: node scripts/agent-cm/validate-images.js

      - name: Commit and push
        run: |
          git config user.name "Camille (Blog Agent)"
          git config user.email "camille@selectchateaux.com"
          git add src/data/blog-posts-camille.ts public/images/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            SLUGS=$(node -e "try{const r=JSON.parse(require('fs').readFileSync('/tmp/pipeline-result.json','utf8').split('\n').filter(l=>l.startsWith('{')).pop());console.log(r.slugs?.join(' + ')||'daily')}catch{console.log('daily')}")
            git commit -m "feat(blog): publier ${SLUGS} — Agent Camille $(date -u +%Y-%m-%d)"
            git push origin main
            echo "Publié et pushé !"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Camille Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Articles file**: $(wc -c < src/data/blog-posts-camille.ts) bytes" >> $GITHUB_STEP_SUMMARY
          echo "- **Blog images**: $(ls public/images/*.webp 2>/dev/null | wc -l) files" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/pipeline-result.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            tail -1 /tmp/pipeline-result.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
